name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example, v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_TAG: ${{ github.ref_name }}
          MANUAL_TAG: ${{ inputs.tag }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG="$MANUAL_TAG"
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Tag must look like v1.0.0"
              exit 1
            fi
          else
            TAG="$PUSH_TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Create source archive
        shell: bash
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          git archive \
            --format=zip \
            --prefix="samp-map-editor-${TAG}/" \
            --output="samp-map-editor-${TAG}.zip" \
            HEAD

      - name: Create tag for manual run
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git tag "$TAG" HEAD
            git push origin "$TAG"
          fi

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "samp-map-editor-${TAG}.zip" --clobber
          else
            gh release create "$TAG" \
              "samp-map-editor-${TAG}.zip" \
              --generate-notes \
              --title "SA-MP Map Editor ${TAG}"
          fi
